<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel = "stylesheet" href="css.css">
    <title>Пыточный Механизм альбомы</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        @font-face {
            font-family: 'GOST2304';
            src: url('/static/fonts/gost_2.304_Bold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'GOST2304';
            background-image: url('/static/background.jpg');
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-sizing: border-box;
        }
        .white-card {
            background-image: url('/static/1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 10px;
            max-width: 1200px;
            width: 100%;
            min-height: 1000px;
            padding: 40px;
            margin-top: 300px;
            margin-bottom: 50px;
        }

        .white-card h1,
        .white-card a,
        .white-card p {
            color: white;
        }
        .back-link {
            margin-bottom: 30px;
        }
        .black-link a {
            text-decoration: none;
            color: white;
            font-size: 26px;
        }
        .back-link a:hover {
            color: white;
            font-weught: bolf;
        }
        h1 {
            color: white;
            margin-bottom: 40px;
        }
        h2 {
            color: white;
            margin: 40px 0 20px 0;
        }
        .album-links p {
            margin: 15px 0;
        }
        .album-links a {
            text-decoration: none;
            color: white;
            font-size: 23px;
            display: inline-block;
            width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .album-links a:hover {
            color: white;
            font-weight: bold;
        }
        
        .poligon-section {
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="white-card">
        <div class="black-link">
            <a href="/">На главную</a>
        </div>
        <h1>Альбомы группы Пыточный Механизм</h1>
    </div>
</body>
</html>
